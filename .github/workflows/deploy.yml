name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release --base-href /pLOCKet/ --dart-define=BUILD_VERSION=${{ github.run_number }}

      - name: Add cache-busting to JS/CSS files
        run: |
          cd build/web
          TIMESTAMP=$(date +%s)
          # Renommer main.dart.js avec timestamp
          if [ -f main.dart.js ]; then
            mv main.dart.js main.dart.js?v=$TIMESTAMP
          fi
          # Renommer flutter.js avec timestamp
          if [ -f flutter.js ]; then
            mv flutter.js flutter.js?v=$TIMESTAMP
          fi
          # Mettre à jour les références dans index.html
          sed -i "s/main.dart.js/main.dart.js?v=$TIMESTAMP/g" index.html
          sed -i "s/flutter.js/flutter.js?v=$TIMESTAMP/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
