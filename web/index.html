<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- Cache-busting pour iOS Safari -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pLOCKet">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>pLOCKet</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="pdf_ocr.js"></script>
  
  <!-- Service Worker Registration & Update Detection -->
  <script>
    (function() {
      console.log('[PWA] Script initialization started');
      console.log('[PWA] Display mode:', window.matchMedia('(display-mode: standalone)').matches ? 'standalone' : 'browser');
      console.log('[PWA] User agent:', navigator.userAgent);
      
      let newVersionAvailable = false;
      let waitingWorker = null;

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            console.log('[SW] Attempting registration...');
            const swPath = 'sw.js';
            console.log('[SW] Registration path:', swPath);
            
            const registration = await navigator.serviceWorker.register(swPath, {
              scope: './'
            });
            console.log('[SW] Registered successfully:', registration.scope);

            if (registration.waiting) {
              console.log('[SW] Waiting worker detected on load');
              newVersionAvailable = true;
              waitingWorker = registration.waiting;
              window.dispatchEvent(new CustomEvent('sw-update-available'));
            }

            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('[SW] Update found');
              
              newWorker.addEventListener('statechange', () => {
                console.log('[SW] State change:', newWorker.state);
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('[SW] New version available');
                  newVersionAvailable = true;
                  waitingWorker = newWorker;
                  window.dispatchEvent(new CustomEvent('sw-update-available'));
                }
              });
            });

            setInterval(() => {
              registration.update();
            }, 30 * 60 * 1000);

          } catch (error) {
            console.error('[SW] Registration failed:', error);
            console.log('[SW] App will continue without service worker');
          }
        });
      } else {
        console.log('[SW] Service workers not supported');
      }

      window.applyUpdate = function() {
        console.log('[SW] Applying update...');
        if (waitingWorker) {
          waitingWorker.postMessage('skipWaiting');
          window.location.reload();
        } else {
          console.log('[SW] No waiting worker, reloading page');
          window.location.reload();
        }
      };

      window.checkForUpdate = function() {
        return newVersionAvailable;
      };
      
      console.log('[PWA] Script initialization completed');
    })();
  </script>
  
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
